name: Issue Auto Label

on:
  issues:
    types: [opened]

jobs:
  auto-label:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Extract service and apply label
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.issue.body || '';
            
            // Issue 템플릿의 드롭다운 파싱
            // "### 대상 서비스\n\nsocceroid" 형식
            const match = body.match(/###\s*대상 서비스\s*\n+([^\n]+)/);
            if (!match) {
              console.log('서비스명을 찾을 수 없습니다.');
              return;
            }
            
            const service = match[1].trim();
            const labelName = `service:${service}`;
            
            // 라벨이 없으면 생성
            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: labelName
              });
            } catch (e) {
              // 라벨 없으면 생성 (색상은 서비스별로 구분)
              const colors = {
                'socceroid': '0075ca',
                'wordchain': '00b4d8',
                'haruil': 'e63946',
              };
              const color = colors[service] || '6f42c1';
              
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: labelName,
                color: color,
                description: `${service} 서비스 AI 작업`
              });
            }
            
            // 이슈에 라벨 부착 → ai-issue-task.yml 트리거
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              labels: [labelName]
            });
            
            console.log(`✅ 라벨 부착 완료: ${labelName}`);
