<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 작업 요청 — itnad/ai</title>
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --surface2: #21262d;
      --border: #30363d;
      --text: #e6edf3;
      --text-muted: #7d8590;
      --accent: #58a6ff;
      --accent-dim: #1f3a6e;
      --success: #3fb950;
      --error: #f85149;
      --warning: #d29922;

      /* 서비스별 색상 */
      --socceroid: #0075ca;
      --wordchain: #00b4d8;
      --haruil: #e63946;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 48px;
    }

    header {
      width: 100%;
      max-width: 640px;
      margin-bottom: 32px;
    }

    .logo {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 8px;
      letter-spacing: 0.05em;
    }

    h1 {
      font-size: 22px;
      font-weight: 600;
      color: var(--text);
    }

    h1 span {
      color: var(--accent);
    }

    .card {
      width: 100%;
      max-width: 640px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* 서비스 선택 */
    .service-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 10px;
    }

    .service-btn {
      background: var(--surface2);
      border: 2px solid var(--border);
      border-radius: 8px;
      padding: 12px 10px;
      cursor: pointer;
      transition: all 0.15s;
      text-align: center;
    }

    .service-btn:hover {
      border-color: var(--accent);
      background: var(--accent-dim);
    }

    .service-btn.selected {
      border-color: var(--accent);
      background: var(--accent-dim);
    }

    .service-btn .svc-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
    }

    .service-btn .svc-type {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 3px;
    }

    .service-btn .svc-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin: 0 auto 6px;
    }

    /* 폼 요소 */
    label {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      display: block;
      margin-bottom: 8px;
    }

    textarea, input[type="password"] {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 14px;
      padding: 12px;
      resize: vertical;
      outline: none;
      font-family: inherit;
      transition: border-color 0.15s;
    }

    textarea:focus, input[type="password"]:focus {
      border-color: var(--accent);
    }

    textarea { min-height: 120px; }

    .field { display: flex; flex-direction: column; }

    /* 버튼 */
    .submit-btn {
      background: var(--accent);
      color: #0d1117;
      border: none;
      border-radius: 8px;
      padding: 14px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s;
      width: 100%;
    }

    .submit-btn:hover { opacity: 0.85; }
    .submit-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* 상태 메시지 */
    .status {
      padding: 12px 14px;
      border-radius: 8px;
      font-size: 13px;
      display: none;
    }

    .status.success { background: #1a3a22; border: 1px solid var(--success); color: var(--success); display: block; }
    .status.error   { background: #3a1a1a; border: 1px solid var(--error);   color: var(--error);   display: block; }
    .status.loading { background: var(--surface2); border: 1px solid var(--border); color: var(--text-muted); display: block; }

    /* 설정 토글 */
    .settings-toggle {
      font-size: 12px;
      color: var(--text-muted);
      cursor: pointer;
      background: none;
      border: none;
      padding: 0;
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    .settings-panel {
      display: none;
      flex-direction: column;
      gap: 12px;
    }

    .settings-panel.open { display: flex; }

    /* 이슈 링크 */
    .issue-link {
      display: none;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 13px;
      color: var(--accent);
      text-decoration: none;
    }

    .issue-link.visible { display: flex; }
  </style>
</head>
<body>

<header>
  <div class="logo">itnad / ai</div>
  <h1>AI <span>작업 요청</span></h1>
</header>

<div class="card">

  <!-- 서비스 선택 -->
  <div class="field">
    <label>대상 서비스</label>
    <div class="service-grid" id="serviceGrid">
      <!-- JS로 렌더링 -->
    </div>
  </div>

  <!-- 작업 내용 -->
  <div class="field">
    <label>작업 내용</label>
    <textarea id="task" placeholder="요청할 작업을 구체적으로 작성해주세요.&#10;&#10;예) 메인 페이지 상단에 공지사항 배너를 추가해줘. 배경은 노란색, 텍스트는 검정색으로."></textarea>
  </div>

  <!-- 추가 컨텍스트 -->
  <div class="field">
    <label>추가 컨텍스트 <span style="font-weight:400;color:var(--text-muted)">(선택)</span></label>
    <textarea id="context" style="min-height:72px" placeholder="관련 파일 경로, 에러 메시지, 참고 사항 등"></textarea>
  </div>

  <!-- 설정 (토큰) -->
  <div>
    <button class="settings-toggle" onclick="toggleSettings()">⚙ GitHub 토큰 설정</button>
    <div class="settings-panel" id="settingsPanel">
      <div class="field" style="margin-top:10px">
        <label>GitHub Personal Access Token</label>
        <input type="password" id="ghToken" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx" />
        <span style="font-size:11px;color:var(--text-muted);margin-top:4px">
          브라우저에 저장됩니다. 필요 권한: repo (issues:write)
        </span>
      </div>
    </div>
  </div>

  <!-- 제출 -->
  <button class="submit-btn" id="submitBtn" onclick="submit()">작업 요청 →</button>

  <!-- 상태 -->
  <div class="status" id="status"></div>

  <!-- 이슈 링크 -->
  <a class="issue-link" id="issueLink" target="_blank">
    <span>🔗</span>
    <span id="issueLinkText"></span>
  </a>

</div>

<script>
  // ── 서비스 목록 ─────────────────────────────────────────────────────
  // 서비스 추가 시 여기에만 추가하면 됨
  const SERVICES = [
    { name: 'socceroid', type: 'fullstack', color: '#0075ca' },
    { name: 'wordchain', type: 'static',    color: '#00b4d8' },
    { name: 'haruil',   type: 'fullstack', color: '#e63946' },
    // { name: 'new-service', type: 'api', color: '#3fb950' },
  ];

  const REPO = 'itnad/ai'; // ← 레포지토리명 확인

  let selectedService = null;

  // 서비스 버튼 렌더링
  const grid = document.getElementById('serviceGrid');
  SERVICES.forEach(svc => {
    const btn = document.createElement('button');
    btn.className = 'service-btn';
    btn.dataset.name = svc.name;
    btn.innerHTML = `
      <div class="svc-dot" style="background:${svc.color}"></div>
      <div class="svc-name">${svc.name}</div>
      <div class="svc-type">${svc.type}</div>
    `;
    btn.onclick = () => selectService(svc.name, btn);
    grid.appendChild(btn);
  });

  function selectService(name, btn) {
    document.querySelectorAll('.service-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    selectedService = name;
  }

  // 토큰 저장/불러오기
  const tokenInput = document.getElementById('ghToken');
  tokenInput.value = localStorage.getItem('gh_token') || '';
  tokenInput.addEventListener('change', () => {
    localStorage.setItem('gh_token', tokenInput.value.trim());
  });

  function toggleSettings() {
    const panel = document.getElementById('settingsPanel');
    panel.classList.toggle('open');
  }

  function setStatus(msg, type) {
    const el = document.getElementById('status');
    el.textContent = msg;
    el.className = `status ${type}`;
  }

  // ── 제출 ─────────────────────────────────────────────────────────────
  async function submit() {
    const token   = localStorage.getItem('gh_token') || '';
    const task    = document.getElementById('task').value.trim();
    const context = document.getElementById('context').value.trim();

    if (!selectedService) { setStatus('서비스를 선택해주세요.', 'error'); return; }
    if (!task)             { setStatus('작업 내용을 입력해주세요.', 'error'); return; }
    if (!token)            { setStatus('GitHub 토큰을 설정해주세요. (⚙ 토큰 설정 클릭)', 'error'); return; }

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    setStatus('이슈를 생성하는 중...', 'loading');

    // 이슈 본문 구성 (Issue 템플릿 파싱 형식과 일치)
    const body = [
      `### 대상 서비스`,
      ``,
      selectedService,
      ``,
      `### 작업 내용`,
      ``,
      task,
      context ? `\n### 추가 컨텍스트\n\n${context}` : '',
    ].join('\n');

    try {
      const [owner, repo] = REPO.split('/');
      const res = await fetch(`https://api.github.com/repos/${owner}/${repo}/issues`, {
        method: 'POST',
        headers: {
          'Authorization': `Bearer ${token}`,
          'Content-Type': 'application/json',
          'X-GitHub-Api-Version': '2022-11-28',
        },
        body: JSON.stringify({
          title: `[AI:${selectedService}] ${task.slice(0, 60)}${task.length > 60 ? '...' : ''}`,
          body,
        }),
      });

      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.message || `HTTP ${res.status}`);
      }

      const issue = await res.json();
      setStatus(`✅ 이슈 #${issue.number} 생성 완료. AI가 곧 작업을 시작합니다.`, 'success');

      const linkEl = document.getElementById('issueLink');
      const linkText = document.getElementById('issueLinkText');
      linkEl.href = issue.html_url;
      linkText.textContent = `이슈 #${issue.number} 보기 → ${issue.html_url}`;
      linkEl.classList.add('visible');

      // 입력 초기화
      document.getElementById('task').value = '';
      document.getElementById('context').value = '';
      document.querySelectorAll('.service-btn').forEach(b => b.classList.remove('selected'));
      selectedService = null;

    } catch (e) {
      setStatus(`❌ 오류: ${e.message}`, 'error');
    } finally {
      btn.disabled = false;
    }
  }
</script>
</body>
</html>
